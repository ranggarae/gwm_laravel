version: '3'

services:
  app:
    image: webdevops/php-apache:7.4
    ports:
      - "8000:80"
    volumes:
      - ./:/app
    environment:
      - WEB_DOCUMENT_ROOT=/app/public_html
      - PHP_DISPLAY_ERRORS=1
    depends_on:
      - mysql

  mysql:
    image: mysql:5.7
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gitawaha_web
    volumes:
      - db_data:/var/lib/mysql
      - ./gitawaha_web.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
